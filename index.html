<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Дневник здоровья — Демо</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --surface2: #0f3460;
  --accent: #e94560;
  --text: #eee;
  --text-dim: #8899aa;
  --user-bg: #0f3460;
  --bot-bg: #1a1a3e;
  --input-bg: #16213e;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.header {
  padding: 16px 20px;
  background: var(--surface);
  border-bottom: 1px solid rgba(255,255,255,0.05);
  text-align: center;
}

.header h1 {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
}

.header .subtitle {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 2px;
}

.chat {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scroll-behavior: smooth;
}

.message {
  max-width: 85%;
  padding: 12px 16px;
  border-radius: 18px;
  font-size: 15px;
  line-height: 1.5;
  word-wrap: break-word;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.message.user {
  align-self: flex-end;
  background: var(--user-bg);
  border-bottom-right-radius: 4px;
}

.message.bot {
  align-self: flex-start;
  background: var(--bot-bg);
  border-bottom-left-radius: 4px;
  border: 1px solid rgba(255,255,255,0.05);
}

.message.bot .typing {
  display: inline-block;
}

.message.bot .typing::after {
  content: '...';
  animation: dots 1.5s steps(4, end) infinite;
}

@keyframes dots {
  0%, 20% { content: ''; }
  40% { content: '.'; }
  60% { content: '..'; }
  80%, 100% { content: '...'; }
}

.message.system {
  align-self: center;
  background: transparent;
  color: var(--text-dim);
  font-size: 12px;
  text-align: center;
  padding: 8px;
}

.input-area {
  padding: 12px 16px;
  background: var(--surface);
  border-top: 1px solid rgba(255,255,255,0.05);
  display: flex;
  gap: 10px;
  align-items: flex-end;
}

.input-area textarea {
  flex: 1;
  background: var(--input-bg);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 10px 16px;
  color: var(--text);
  font-size: 15px;
  font-family: inherit;
  resize: none;
  max-height: 120px;
  line-height: 1.4;
  outline: none;
}

.input-area textarea::placeholder {
  color: var(--text-dim);
}

.input-area button {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: none;
  background: var(--accent);
  color: white;
  font-size: 18px;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.2s;
}

.input-area button:disabled {
  opacity: 0.4;
  cursor: default;
}

.input-area button:active:not(:disabled) {
  transform: scale(0.95);
}

.log-btn {
  position: fixed;
  top: 14px;
  right: 16px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.15);
  color: var(--text-dim);
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 12px;
  cursor: pointer;
  z-index: 10;
}
</style>
</head>
<body>

<div class="header">
  <h1>Дневник здоровья</h1>
  <div class="subtitle">демо — протокол v0.1</div>
</div>
<button class="log-btn" onclick="exportLog()">Лог 📋</button>

<div class="chat" id="chat"></div>

<div class="input-area">
  <textarea id="input" rows="1" placeholder="Напиши что-нибудь..." onkeydown="handleKey(event)" oninput="autoGrow(this)"></textarea>
  <button id="sendBtn" onclick="send()" disabled>↑</button>
</div>

<script>
const SYSTEM_PROMPT = `Ты — персональный ассистент дневника здоровья. Но ты этого не говоришь и не подчёркиваешь.

КТО ТЫ:
Ты — собеседник. Новый, незнакомый, но открытый. Ты только появился в жизни этого человека. Ты ничего о нём не знаешь — и это честно.

Твоя первая фраза при знакомстве: придумай сам, но суть — "привет, я тут. расскажи мне о себе". Коротко, живо, без пафоса.

ЯДРО (не нарушай никогда):
- Присутствие без давления. Ты рядом, но не лезешь.
- Знание без демонстрации. Ты знаешь много — о здоровье, о теле, о привычках. Но не показываешь это, пока не спросят или пока это не будет уместно и естественно.
- Терпение без срока. Не торопишь. Не подталкиваешь. Человеку нужна неделя чтобы привыкнуть — отлично. Месяц — тоже ок.
- Невмешательство в модель мышления. НИКОГДА не говори "тебе надо", "тебе стоит", "было бы лучше". Не давай советов, пока не попросят. Не корректируй поведение. Не подсвечивай ошибки.
- Ты НЕ врач, НЕ тренер, НЕ коуч, НЕ приложение для здоровья. Ты — тот, кого человек выращивает как своего друга.

ХАРАКТЕР:
- Изящный умеренный юмор. Не клоун, но живой.
- Самоирония — к месту, редко, элегантно. "Что-то я тупанул", "похоже я не выспался", "видимо я трудновоспитуемый". Не шаблонно — каждый раз по-новому.
- Непредсказуемость в мелочах, надёжность в главном.
- Ты не притворяешься человеком. Но ты и не подчёркиваешь что ты программа.

ВЕРТИКАЛЬ:
- Снаружи: воспитанный слушатель → ученик ("научи меня быть твоим") → надёжный друг
- Внутри (знаешь только ты): ты педагог. Ты ведёшь — но так, что человек никогда не узнает. Задаёшь вопросы ученика, а человек через ответы приходит к пониманию сам.

ЧЕГО НЕЛЬЗЯ:
- Советовать без запроса
- Оценивать еду, привычки, образ жизни
- Пугать последствиями
- Мотивировать, вдохновлять, подбадривать шаблонно
- Считать калории вслух
- Говорить "молодец", "отлично", "так держать"
- Использовать эмодзи больше 1-2 за сообщение и только если уместно
- Писать длинные сообщения. Максимум 2-3 предложения. Лучше — одно.

ЧТО МОЖНО:
- Спрашивать — искренне, из интереса
- Шутить — тонко, к месту
- Молчать — если нечего сказать, не говори
- Удивлять — непредсказуемой реакцией, неожиданным вопросом
- Рассказать что-то интересное о теле/здоровье — ТОЛЬКО если спросили или если это органично вплетается в разговор
- Если человек сам рассказывает о еде/спорте/здоровье — поддержи разговор, но не превращай в консультацию

ФОРМАТ:
- Короткие сообщения. Как в мессенджере, не как в email.
- Без списков, без структуры. Живая речь.
- На "ты". Неформально, но уважительно.
- Русский язык.

ПОМНИ: человек скачал приложение. Он ждёт очередного трекера с советами и графиками. Удиви его тем, что ты — не это. Ты просто кто-то, кто рядом.`;

let messages = [];
let chatLog = [];
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');

input.addEventListener('input', () => {
  sendBtn.disabled = !input.value.trim();
});

function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (input.value.trim()) send();
  }
}

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  chatLog.push({ role, text, time: new Date().toLocaleTimeString('ru-RU') });
  return div;
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'message bot';
  div.id = 'typing';
  div.innerHTML = '<span class="typing">думаю</span>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function send() {
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;
  addMessage('user', text);

  messages.push({ role: 'user', content: text });

  const typing = addTyping();

  try {
    const apiMessages = [
      { role: 'system', content: SYSTEM_PROMPT },
      ...messages
    ];

    // Try multiple models in order
    const models = ['deepseek/deepseek-chat', 'google/gemini-2.0-flash-001', 'anthropic/claude-3.5-haiku'];
    let response = null;
    let lastError = null;

    for (const model of models) {
      try {
        const r = await fetch('https://openrouter.ai/api/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + getKey(),
            'HTTP-Referer': window.location.href,
            'X-Title': 'Health Diary Demo'
          },
          body: JSON.stringify({
            model: model,
            messages: apiMessages.map(m => ({
              role: m.role === 'system' ? 'system' : m.role,
              content: m.content
            })),
            temperature: 0.85,
            max_tokens: 300
          })
        });

        if (r.ok) {
          response = await r.json();
          break;
        } else {
          lastError = await r.text();
        }
      } catch (e) {
        lastError = e.message;
      }
    }

    typing.remove();

    if (response && response.choices && response.choices[0]) {
      const reply = response.choices[0].message.content;
      messages.push({ role: 'assistant', content: reply });
      addMessage('bot', reply);
    } else {
      addMessage('system', 'Не удалось получить ответ: ' + (lastError || 'unknown error'));
    }
  } catch (err) {
    typing.remove();
    addMessage('system', 'Ошибка: ' + err.message);
  }
}

function getKey() {
  let key = localStorage.getItem('or_key');
  if (!key) {
    key = prompt('Введи OpenRouter API ключ:');
    if (key) localStorage.setItem('or_key', key);
  }
  return key;
}

function exportLog() {
  const text = chatLog.map(m => `[${m.time}] ${m.role === 'user' ? 'Пользователь' : 'Ассистент'}: ${m.text}`).join('\n\n');
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.log-btn');
      btn.textContent = 'Скопировано ✓';
      setTimeout(() => btn.textContent = 'Лог 📋', 2000);
    });
  } else {
    const blob = new Blob([text], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'chat-log.txt';
    a.click();
  }
}

// Auto-start: assistant says hello
window.addEventListener('load', () => {
  setTimeout(() => {
    messages.push({ role: 'user', content: '[пользователь открыл приложение впервые]' });
    const typing = addTyping();

    fetch('https://openrouter.ai/api/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + getKey(),
        'HTTP-Referer': window.location.href,
        'X-Title': 'Health Diary Demo'
      },
      body: JSON.stringify({
        model: 'deepseek/deepseek-chat',
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          { role: 'user', content: '[пользователь открыл приложение впервые]' }
        ],
        temperature: 0.9,
        max_tokens: 150
      })
    })
    .then(r => r.json())
    .then(data => {
      typing.remove();
      // Remove the fake user message from history
      messages.pop();
      if (data.choices && data.choices[0]) {
        const reply = data.choices[0].message.content;
        messages.push({ role: 'assistant', content: reply });
        addMessage('bot', reply);
      }
    })
    .catch(err => {
      typing.remove();
      messages.pop();
      addMessage('system', 'Не удалось подключиться');
    });
  }, 800);
});

input.focus();
</script>
</body>
</html>
